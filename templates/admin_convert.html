{% extends "layout.html" %}
{% block title %}Excel 转换{% endblock %}
{% set active_nav = 'convert' %}
{% block content %}
<section class="glass-card upload-card mb-4 slide-up">
  <h1 class="section-title mb-3">日志 Excel 转换</h1>
  <div class="row g-4 align-items-end">
    <div class="col-lg-5">
      <label class="form-label glow-label">上传日志 Excel</label>
      <div id="dropZone" class="drop-zone">
        <input type="file" id="fileInput" accept=".xlsx,.xlsm,.xls" hidden>
        <div class="drop-icon"><i class="bi bi-cloud-arrow-up"></i></div>
        <div class="drop-title">拖拽文件到此处，或点击选择</div>
        <div id="fileName" class="file-name"></div>
      </div>
    </div>
    <div class="col-lg-3">
      <label class="form-label glow-label">统计年份</label>
      <select id="yearSelect" class="form-select neon-input"></select>
    </div>
    <div class="col-lg-2">
      <label class="form-label glow-label">统计月份</label>
      <select id="monthSelect" class="form-select neon-input"></select>
    </div>
    <div class="col-lg-2">
      <button id="submitBtn" class="btn btn-neon w-100">开始统计</button>
    </div>
  </div>
  <div id="errorAlert" class="alert alert-danger mt-4 d-none"></div>
</section>

<section class="glass-card history-card mb-4 slide-up">
  <div class="d-flex justify-content-between mb-3">
    <h2 class="mini-title mb-0">转换历史</h2>
    <span id="historyCount" class="tag tag-blue">0 条</span>
  </div>
  <div id="historyEmpty" class="history-empty">暂无记录</div>
  <div id="historyList" class="history-list"></div>
</section>

<section id="resultSection" class="d-none">
  <div class="d-flex justify-content-between mb-3">
    <p id="resultMeta" class="section-subtitle mb-0"></p>
    <a id="downloadBtn" class="btn btn-download" href="#" download>下载 Excel</a>
  </div>
  <div class="row g-4 mb-4">
    <div class="col-md-3"><div class="stat-card"><div class="stat-value" id="statRecords">0</div><div class="stat-label">日志条数</div></div></div>
    <div class="col-md-3"><div class="stat-card"><div class="stat-value" id="statHours">0</div><div class="stat-label">总工时</div></div></div>
    <div class="col-md-3"><div class="stat-card"><div class="stat-value" id="statPeople">0</div><div class="stat-label">人数</div></div></div>
    <div class="col-md-3"><div class="stat-card"><div class="stat-value" id="statDays">0</div><div class="stat-label">天数</div></div></div>
  </div>
  <div class="glass-card detail-card">
    <div class="table-responsive detail-table-wrap">
      <table class="table table-dark table-hover mb-0">
        <thead><tr><th>项目</th><th>姓名</th><th>日期</th><th>工时</th><th>工作内容</th></tr></thead>
        <tbody id="detailBody"></tbody>
      </table>
    </div>
  </div>
</section>
{% endblock %}
{% block scripts %}
<script src="{{ url_for('static', filename='js/admin_convert.js') }}"></script>
{% endblock %}
