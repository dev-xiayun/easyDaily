{% extends "layout.html" %}
{% block title %}人员管理{% endblock %}
{% set active_nav = 'users' %}
{% block content %}
<section class="glass-card mb-4 slide-up user-stats-section">
  <h1 class="section-title mb-1">人员管理</h1>
  <p class="section-subtitle mb-3">审核注册用户并管理账号权限</p>
  <div id="userStatsPanel">
    <div class="history-empty">加载中...</div>
  </div>
</section>

<section class="glass-card slide-up">
  <div class="row g-3 align-items-end mb-3">
    <div class="col-md-3">
      <label class="glow-label form-label">用户名/姓名</label>
      <input type="text" id="keywordFilter" class="form-control neon-input" placeholder="支持用户名、姓名模糊查询">
    </div>
    <div class="col-md-2">
      <label class="glow-label form-label">角色</label>
      <select id="roleFilter" class="form-select neon-input">
        <option value="">全部</option>
        <option value="admin">管理员</option>
        <option value="user">普通用户</option>
      </select>
    </div>
    <div class="col-md-2">
      <label class="glow-label form-label">审核状态</label>
      <select id="statusFilter" class="form-select neon-input">
        <option value="">全部</option>
        <option value="pending">待审核</option>
        <option value="approved">已通过</option>
        <option value="rejected">已拒绝</option>
      </select>
    </div>
    <div class="col-md-2">
      <button type="button" id="searchBtn" class="btn btn-neon w-100">查询</button>
    </div>
  </div>
  <div id="pageAlert" class="alert d-none mb-3"></div>
  <div class="table-responsive detail-table-wrap">
    <table class="table table-dark table-hover align-middle mb-0">
      <thead>
        <tr>
          <th>用户名</th>
          <th>姓名</th>
          <th>角色</th>
          <th>审核状态</th>
          <th>注册时间</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody id="userBody"></tbody>
    </table>
  </div>
  <div id="userPagination" class="table-pagination"></div>
</section>

<div class="modal fade" id="passwordModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content glass-modal">
      <div class="modal-header border-0">
        <h5 class="modal-title">设置密码</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <p class="section-subtitle">为用户 <strong id="passwordTargetName"></strong> 设置新密码</p>
        <div class="mb-3">
          <label class="glow-label form-label">新密码</label>
          <input type="password" class="form-control neon-input" id="adminPasswordInput">
        </div>
        <div class="mb-3">
          <label class="glow-label form-label">确认新密码</label>
          <input type="password" class="form-control neon-input" id="adminConfirmPasswordInput">
        </div>
        <p class="section-subtitle mb-0">密码长度需超过 6 位，无复杂度要求</p>
        <div id="passwordAlert" class="alert d-none mt-3"></div>
      </div>
      <div class="modal-footer border-0">
        <button type="button" class="btn btn-outline-neon" data-bs-dismiss="modal">取消</button>
        <button type="button" class="btn btn-neon" id="savePasswordBtn">确认设置</button>
      </div>
    </div>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script src="{{ url_for('static', filename='js/admin_users.js') }}"></script>
{% endblock %}
