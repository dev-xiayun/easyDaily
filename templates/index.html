<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>日志统计转换中心</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <div class="bg-layer">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="grid-overlay"></div>
  </div>

  <div class="container py-4 py-lg-5">
    <nav class="top-nav fade-in">
      <a class="nav-link active" href="/"><i class="bi bi-house-door-fill me-2"></i>首页</a>
      <a class="nav-link" href="/projects"><i class="bi bi-kanban-fill me-2"></i>项目管理</a>
    </nav>

    <header class="hero text-center mb-5 fade-in">
      <div class="hero-badge mb-3">
        <i class="bi bi-stars"></i> Daily Log Converter
      </div>
      <h1 class="hero-title">日志统计转换中心</h1>
      <p class="hero-subtitle">上传日志填报 Excel · 选择年月 · 一键生成统计报表</p>
    </header>

    <section class="glass-card upload-card mb-4 slide-up">
      <div class="card-glow"></div>
      <div class="row g-4 align-items-end">
        <div class="col-lg-5">
          <label class="form-label glow-label">上传日志 Excel</label>
          <div id="dropZone" class="drop-zone">
            <input type="file" id="fileInput" accept=".xlsx,.xlsm,.xls" hidden>
            <div class="drop-icon"><i class="bi bi-cloud-arrow-up"></i></div>
            <div class="drop-title">拖拽文件到此处，或点击选择</div>
            <div class="drop-hint">支持 .xlsx / .xlsm / .xls</div>
            <div id="fileName" class="file-name"></div>
          </div>
        </div>
        <div class="col-lg-3">
          <label class="form-label glow-label">统计年份</label>
          <select id="yearSelect" class="form-select neon-input"></select>
        </div>
        <div class="col-lg-2">
          <label class="form-label glow-label">统计月份</label>
          <select id="monthSelect" class="form-select neon-input"></select>
        </div>
        <div class="col-lg-2">
          <button id="submitBtn" class="btn btn-neon w-100">
            <span class="btn-text"><i class="bi bi-lightning-charge-fill me-2"></i>开始统计</span>
            <span class="btn-loading d-none"><span class="spinner-border spinner-border-sm me-2"></span>解析中</span>
          </button>
        </div>
      </div>
      <div id="errorAlert" class="alert alert-danger mt-4 d-none" role="alert"></div>
    </section>

    <section class="glass-card history-card mb-5 slide-up" style="animation-delay: 0.08s">
      <div class="d-flex flex-wrap justify-content-between align-items-center gap-3 mb-3">
        <h2 class="mini-title mb-0"><i class="bi bi-clock-history me-2"></i>转换历史记录</h2>
        <span id="historyCount" class="tag tag-blue">0 条记录</span>
      </div>
      <div id="historyEmpty" class="history-empty">暂无转换记录，完成一次统计后会自动保存到这里</div>
      <div id="historyList" class="history-list"></div>
    </section>

    <section id="resultSection" class="d-none">
      <div class="result-header d-flex flex-wrap justify-content-between align-items-center gap-3 mb-4 fade-in">
        <div>
          <h2 class="section-title mb-1">统计概览</h2>
          <p id="resultMeta" class="section-subtitle mb-0"></p>
        </div>
        <a id="downloadBtn" class="btn btn-download" href="#" download>
          <i class="bi bi-download me-2"></i>下载 Excel 报表
        </a>
      </div>

      <div class="row g-4 mb-4">
        <div class="col-md-6 col-xl-3">
          <div class="stat-card stat-card-1 slide-up" style="animation-delay: 0.05s">
            <div class="stat-icon"><i class="bi bi-journal-text"></i></div>
            <div class="stat-value" data-count="0">0</div>
            <div class="stat-label">日志条数</div>
          </div>
        </div>
        <div class="col-md-6 col-xl-3">
          <div class="stat-card stat-card-2 slide-up" style="animation-delay: 0.1s">
            <div class="stat-icon"><i class="bi bi-clock-history"></i></div>
            <div class="stat-value" data-count="0">0</div>
            <div class="stat-label">总工时（小时）</div>
          </div>
        </div>
        <div class="col-md-6 col-xl-3">
          <div class="stat-card stat-card-3 slide-up" style="animation-delay: 0.15s">
            <div class="stat-icon"><i class="bi bi-people-fill"></i></div>
            <div class="stat-value" data-count="0">0</div>
            <div class="stat-label">参与人数</div>
          </div>
        </div>
        <div class="col-md-6 col-xl-3">
          <div class="stat-card stat-card-4 slide-up" style="animation-delay: 0.2s">
            <div class="stat-icon"><i class="bi bi-calendar3"></i></div>
            <div class="stat-value" data-count="0">0</div>
            <div class="stat-label">统计天数</div>
          </div>
        </div>
      </div>

      <div class="row g-4 mb-4">
        <div class="col-lg-6">
          <div class="glass-card chart-card slide-up" style="animation-delay: 0.25s">
            <h3 class="mini-title"><i class="bi bi-diagram-3 me-2"></i>项目工时分布</h3>
            <div id="projectBars" class="bar-list"></div>
          </div>
        </div>
        <div class="col-lg-6">
          <div class="glass-card chart-card slide-up" style="animation-delay: 0.3s">
            <h3 class="mini-title"><i class="bi bi-person-lines-fill me-2"></i>人员工时排行</h3>
            <div id="personBars" class="bar-list"></div>
          </div>
        </div>
      </div>

      <div class="glass-card detail-card slide-up" style="animation-delay: 0.35s">
        <div class="d-flex flex-wrap justify-content-between align-items-center gap-3 mb-3">
          <h3 class="mini-title mb-0"><i class="bi bi-table me-2"></i>明细列表</h3>
          <div class="detail-tags">
            <span id="projectTag" class="tag tag-blue"></span>
            <span id="unknownTag" class="tag tag-amber"></span>
          </div>
        </div>
        <div class="table-responsive detail-table-wrap">
          <table class="table table-dark table-hover align-middle mb-0">
            <thead>
              <tr>
                <th>项目</th>
                <th>姓名</th>
                <th>日期</th>
                <th>工时（小时）</th>
                <th>工作内容</th>
              </tr>
            </thead>
            <tbody id="detailBody"></tbody>
          </table>
        </div>
      </div>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="{{ url_for('static', filename='js/common.js') }}"></script>
  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
