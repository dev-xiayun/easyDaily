<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>项目管理 - 日志统计转换中心</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <div class="bg-layer">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="grid-overlay"></div>
  </div>

  <div class="container py-4 py-lg-5">
    <nav class="top-nav fade-in">
      <a class="nav-link" href="/"><i class="bi bi-house-door-fill me-2"></i>首页</a>
      <a class="nav-link active" href="/projects"><i class="bi bi-kanban-fill me-2"></i>项目管理</a>
    </nav>

    <header class="hero text-center mb-4 fade-in">
      <h1 class="hero-title hero-title-sm">项目管理</h1>
      <p class="hero-subtitle">维护标准项目名称与别名映射，别名支持使用 ; 或 ； 分隔</p>
    </header>

    <section class="glass-card mb-4 slide-up">
      <div class="d-flex flex-wrap justify-content-between align-items-center gap-3 mb-4">
        <div>
          <h2 class="mini-title mb-1"><i class="bi bi-diagram-2 me-2"></i>项目与别名列表</h2>
          <p class="section-subtitle mb-0">编辑完成后点击保存，将写入 project_mapping.json</p>
        </div>
        <div class="d-flex flex-wrap gap-2">
          <button id="addProjectBtn" class="btn btn-outline-neon">
            <i class="bi bi-plus-lg me-2"></i>新增项目
          </button>
          <button id="saveProjectsBtn" class="btn btn-neon">
            <span class="btn-text"><i class="bi bi-save2 me-2"></i>保存配置</span>
            <span class="btn-loading d-none"><span class="spinner-border spinner-border-sm me-2"></span>保存中</span>
          </button>
        </div>
      </div>

      <div id="projectAlert" class="alert d-none" role="alert"></div>

      <div class="table-responsive project-table-wrap">
        <table class="table table-dark align-middle mb-0">
          <thead>
            <tr>
              <th style="width: 28%">项目名称</th>
              <th>项目别名（; 或 ； 分隔）</th>
              <th style="width: 72px"></th>
            </tr>
          </thead>
          <tbody id="projectBody"></tbody>
        </table>
      </div>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="{{ url_for('static', filename='js/common.js') }}"></script>
  <script src="{{ url_for('static', filename='js/projects.js') }}"></script>
</body>
</html>
